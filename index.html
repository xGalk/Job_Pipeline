<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gal · Job Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e11;
  --bg2: #16161a;
  --bg3: #1e1e24;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0eff5;
  --muted: #7a7a8c;
  --accent: #7c6aff;
  --accent2: #a594ff;
  --green: #3ecf8e;
  --amber: #f4b942;
  --red: #f06070;
  --blue: #4da6ff;
  --mono: 'DM Mono', monospace;
  --sans: 'Sora', sans-serif;
  --radius: 10px;
  --radius-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

/* Layout */
.app { max-width: 1200px; margin: 0 auto; padding: 0 1.25rem 4rem; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap; }
.logo { font-family: var(--mono); font-size: 13px; color: var(--muted); letter-spacing: 0.05em; }
.logo span { color: var(--accent2); }
.topbar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.stat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.1rem; }
.stat-label { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
.stat-num { font-size: 26px; font-weight: 600; line-height: 1; }
.stat-num.accent { color: var(--accent2); }
.stat-num.green { color: var(--green); }
.stat-num.amber { color: var(--amber); }

/* Toolbar */
.toolbar { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
.toolbar input[type=text] { background: var(--bg2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); padding: 7px 12px; font-family: var(--sans); font-size: 13px; flex: 1; min-width: 140px; outline: none; transition: border 0.15s; }
.toolbar input[type=text]:focus { border-color: var(--accent); }
.toolbar select { background: var(--bg2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); padding: 7px 10px; font-family: var(--sans); font-size: 13px; outline: none; cursor: pointer; }
.view-toggle { display: flex; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.view-btn { background: none; border: none; color: var(--muted); padding: 7px 14px; cursor: pointer; font-size: 13px; font-family: var(--sans); transition: all 0.15s; }
.view-btn.active { background: var(--accent); color: #fff; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 15px; border-radius: var(--radius); font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
.btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--border2); background: var(--bg3); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-danger { background: transparent; color: var(--red); border-color: rgba(240,96,112,0.3); }
.btn-danger:hover { background: rgba(240,96,112,0.1); }

/* Table view */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { text-align: left; font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; padding: 8px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
tbody tr:hover { background: var(--bg2); }
tbody td { padding: 11px 12px; vertical-align: middle; }
.company-cell { font-weight: 500; }
.role-cell { color: var(--muted); }
.next-cell { font-size: 12px; color: var(--accent2); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Badges */
.badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; white-space: nowrap; font-family: var(--mono); }
.s-watching { background: rgba(77,166,255,0.15); color: var(--blue); }
.s-applied { background: rgba(124,106,255,0.15); color: var(--accent2); }
.s-interview { background: rgba(244,185,66,0.15); color: var(--amber); }
.s-offer { background: rgba(62,207,142,0.15); color: var(--green); }
.s-rejected { background: rgba(240,96,112,0.12); color: var(--red); }
.s-pass { background: rgba(122,122,140,0.15); color: var(--muted); }
.p-high { color: var(--red); font-family: var(--mono); font-size: 11px; }
.p-med { color: var(--amber); font-family: var(--mono); font-size: 11px; }
.p-low { color: var(--muted); font-family: var(--mono); font-size: 11px; }

/* Kanban */
.kanban { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 10px; align-items: start; }
.kanban-col { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px; }
.kanban-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.kanban-title { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
.kanban-count { font-family: var(--mono); font-size: 11px; color: var(--muted); background: var(--bg3); padding: 2px 6px; border-radius: 20px; }
.kanban-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
.kanban-card:hover { border-color: var(--accent); }
.kanban-card:last-child { margin-bottom: 0; }
.kc-company { font-weight: 500; font-size: 13px; margin-bottom: 2px; }
.kc-role { font-size: 12px; color: var(--muted); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.kc-next { font-size: 11px; color: var(--accent2); margin-top: 6px; line-height: 1.4; }
.kc-pri { font-size: 10px; font-family: var(--mono); }

/* Modal */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; align-items: flex-start; justify-content: center; padding: 3rem 1rem; overflow-y: auto; }
.overlay.open { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg); width: 560px; max-width: 100%; padding: 1.75rem; position: relative; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.modal-title { font-size: 16px; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; padding: 2px 6px; border-radius: 6px; }
.modal-close:hover { color: var(--text); background: var(--bg3); }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 11px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 5px; }
.field input, .field select, .field textarea {
  width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  border-radius: var(--radius); padding: 9px 12px; font-family: var(--sans); font-size: 13px;
  outline: none; transition: border 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 72px; line-height: 1.6; }
.field select option { background: var(--bg2); }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }

/* AI suggestion box */
.ai-box { background: rgba(124,106,255,0.08); border: 1px solid rgba(124,106,255,0.25); border-radius: var(--radius); padding: 12px 14px; margin-top: 1rem; }
.ai-label { font-size: 10px; font-family: var(--mono); color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.ai-spinner { width: 10px; height: 10px; border: 1.5px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
.ai-text { font-size: 13px; color: var(--text); line-height: 1.6; }
.ai-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.ai-chip { font-size: 11px; font-family: var(--mono); background: rgba(124,106,255,0.12); border: 1px solid rgba(124,106,255,0.2); color: var(--accent2); padding: 3px 10px; border-radius: 20px; cursor: pointer; transition: background 0.15s; }
.ai-chip:hover { background: rgba(124,106,255,0.22); }
@keyframes spin { to { transform: rotate(360deg); } }

/* Empty state */
.empty { text-align: center; padding: 4rem 1rem; color: var(--muted); }
.empty-icon { font-size: 32px; margin-bottom: 1rem; opacity: 0.4; }
.empty p { font-size: 14px; }

/* Toast */
.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px 16px; font-size: 13px; color: var(--text); z-index: 999; transform: translateY(100px); opacity: 0; transition: all 0.2s; pointer-events: none; }
.toast.show { transform: translateY(0); opacity: 1; }

/* Mobile quick-add FAB */
.fab { display: none; position: fixed; bottom: 1.5rem; right: 1.5rem; width: 52px; height: 52px; background: var(--accent); border-radius: 50%; border: none; color: #fff; font-size: 24px; cursor: pointer; align-items: center; justify-content: center; z-index: 100; box-shadow: 0 4px 20px rgba(124,106,255,0.4); }
@media (max-width: 700px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .kanban { grid-template-columns: repeat(2, 1fr); }
  .two-col { grid-template-columns: 1fr; }
  .fab { display: flex; }
  .btn-primary.desktop-only { display: none; }
  .toolbar { gap: 6px; }
}
@media (max-width: 420px) {
  .kanban { grid-template-columns: 1fr; }
  .stats { grid-template-columns: repeat(2,1fr); }
}

.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.dot-high { background: var(--red); }
.dot-med { background: var(--amber); }
.dot-low { background: var(--muted); }
</style>
</head>
<body>

<div class="app" id="app">

  <!-- Main app -->
  <div id="main">
    <div class="topbar">
      <div class="logo">gal · <span>pipeline</span></div>
      <div class="topbar-right">
        <div class="view-toggle">
          <button class="view-btn active" id="btn-table" onclick="setView('table')">≡ Table</button>
          <button class="view-btn" id="btn-kanban" onclick="setView('kanban')">⊞ Board</button>
        </div>
        <button class="btn btn-primary desktop-only" onclick="openModal()">+ Add role</button>
        <button class="btn btn-ghost btn-sm" onclick="openSettings()" title="Settings">⚙</button>
      </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="toolbar">
      <input type="text" id="search" placeholder="Search company or role..." oninput="renderView()" />
      <select id="f-status" onchange="renderView()">
        <option value="">All statuses</option>
        <option>Watching</option><option>Applied</option><option>Interview</option><option>Offer</option><option>Rejected</option><option>Pass</option>
      </select>
      <select id="f-priority" onchange="renderView()">
        <option value="">All priorities</option>
        <option>High</option><option>Medium</option><option>Low</option>
      </select>
    </div>

    <div id="table-view">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Company</th><th>Role</th><th>Status</th><th>Priority</th><th>Applied</th><th>Source</th><th>Next action</th><th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div id="table-empty" class="empty" style="display:none;"><div class="empty-icon">○</div><p>No roles yet — add one to get started</p></div>
    </div>

    <div id="kanban-view" style="display:none;">
      <div class="kanban" id="kanban"></div>
    </div>
  </div>
</div>

<!-- FAB mobile -->
<button class="fab" onclick="openModal()">+</button>

<!-- Add/Edit modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add role</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>

    <!-- URL autofill -->
    <div class="field" id="autofill-field">
      <label>Paste job URL to autofill ✦</label>
      <div style="display:flex;gap:8px;">
        <input id="f-autofill-url" placeholder="https://linkedin.com/jobs/... or any job page" style="flex:1;" onkeydown="if(event.key==='Enter')autofillFromUrl()" />
        <button class="btn btn-primary" onclick="autofillFromUrl()" id="autofill-btn">Fill</button>
      </div>
      <div id="autofill-status" style="font-size:11px;color:var(--muted);margin-top:4px;min-height:16px;"></div>
    </div>
    <div style="border-top:1px solid var(--border);margin:0.75rem 0;"></div>

    <div class="two-col">
      <div class="field"><label>Company</label><input id="f-company" placeholder="e.g. Wix" /></div>
      <div class="field"><label>Role title</label><input id="f-role" placeholder="e.g. Senior PM" oninput="clearAI()" /></div>
    </div>
    <div class="two-col">
      <div class="field"><label>Status</label>
        <select id="f-status-m" onchange="triggerAI()">
          <option>Watching</option><option>Applied</option><option>Interview</option><option>Offer</option><option>Rejected</option><option>Pass</option>
        </select>
      </div>
      <div class="field"><label>Priority</label>
        <select id="f-priority-m"><option>High</option><option>Medium</option><option>Low</option></select>
      </div>
    </div>
    <div class="two-col">
      <div class="field"><label>Date applied</label><input id="f-date" type="date" /></div>
      <div class="field"><label>Source</label>
        <select id="f-source"><option>LinkedIn</option><option>Referral</option><option>Direct</option><option>Recruiter</option><option>Job board</option><option>Other</option></select>
      </div>
    </div>
    <div class="field"><label>Job URL</label><input id="f-url" placeholder="https://..." /></div>
    <div class="field"><label>Notes</label><textarea id="f-notes" placeholder="Key contacts, interview stage, salary range..."></textarea></div>

    <!-- AI suggestion -->
    <div class="ai-box" id="ai-box" style="display:none;">
      <div class="ai-label"><span class="ai-spinner" id="ai-spinner" style="display:none;"></span> Next action · AI</div>
      <div class="ai-text" id="ai-text"></div>
      <div class="ai-actions" id="ai-chips"></div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="del-btn" onclick="deleteRole()" style="display:none;">Delete</button>
      <div style="display:flex; gap:8px; margin-left:auto;">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveRole()">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Settings: optional AI key + backup -->
<div class="overlay" id="settings-overlay" onclick="settingsOverlayClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title">Settings</div>
      <button class="modal-close" onclick="closeSettings()">×</button>
    </div>
    <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:1.25rem;">Data is always cached in this browser. Add Supabase below to sync the same list from any device on the web (see <code style="font-family:var(--mono);font-size:12px;">supabase-setup.sql</code> in the repo).</p>
    <div class="field"><label>Supabase project URL</label><input id="settings-supabase-url" type="url" placeholder="https://xxxx.supabase.co" autocomplete="off" /></div>
    <div class="field"><label>Supabase anon public key</label><input id="settings-supabase-key" type="password" placeholder="eyJhbGciOiJIUzI1NiIs…" autocomplete="off" /></div>
    <div class="field"><label>Optional: Anthropic API key (AI next-step & “Fill from URL”)</label><input id="settings-api-key" type="password" placeholder="sk-ant-…" autocomplete="off" /></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;">
      <button type="button" class="btn btn-ghost" onclick="exportBackup()">Export JSON</button>
      <button type="button" class="btn btn-ghost" onclick="document.getElementById('import-file').click()">Import JSON</button>
      <input type="file" id="import-file" accept="application/json,.json" style="display:none" onchange="importBackup(event)" />
    </div>
    <div class="modal-footer" style="border-top:none;padding-top:0;margin-top:0;">
      <button type="button" class="btn btn-danger btn-sm" onclick="clearAllData()">Erase all roles</button>
      <div style="display:flex;gap:8px;margin-left:auto;">
        <button type="button" class="btn btn-ghost" onclick="closeSettings()">Close</button>
        <button type="button" class="btn btn-primary" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let jobs = [];
let editingId = null;
let view = 'table';
let aiTimeout = null;

const STATUSES = ['Watching','Applied','Interview','Offer','Rejected','Pass'];
const STORAGE_KEY = 'gal_jobs_v1';

// --- Config (optional API key for AI; optional Supabase for cloud sync) ---
function getConfig() {
  return { apiKey: localStorage.getItem('gal_api_key') || '' };
}

function getSupabaseCredentials() {
  return {
    url: (localStorage.getItem('gal_supabase_url') || '').trim().replace(/\/$/, ''),
    key: (localStorage.getItem('gal_supabase_key') || '').trim()
  };
}

function supabaseConfigured() {
  const { url, key } = getSupabaseCredentials();
  return !!(url && key && url.startsWith('http'));
}

async function loadFromSupabase() {
  const { url, key } = getSupabaseCredentials();
  const r = await fetch(`${url}/rest/v1/pipeline_state?id=eq.main&select=jobs`, {
    headers: { apikey: key, Authorization: `Bearer ${key}`, Accept: 'application/json' }
  });
  if (!r.ok) throw new Error(await r.text());
  const rows = await r.json();
  if (!rows.length) return [];
  const j = rows[0].jobs;
  return Array.isArray(j) ? j : [];
}

async function saveToSupabase() {
  const { url, key } = getSupabaseCredentials();
  const r = await fetch(`${url}/rest/v1/pipeline_state?on_conflict=id`, {
    method: 'POST',
    headers: {
      apikey: key,
      Authorization: `Bearer ${key}`,
      'Content-Type': 'application/json',
      Prefer: 'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify({ id: 'main', jobs: jobs })
  });
  if (!r.ok) throw new Error(await r.text());
}

function loadJobsFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const data = JSON.parse(raw);
    return Array.isArray(data) ? data : [];
  } catch (e) {
    return [];
  }
}

function persistJobsLocal() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(jobs));
  } catch (e) {
    toast('Could not save — storage may be full');
  }
}

async function persistJobs() {
  persistJobsLocal();
  if (!supabaseConfigured()) return;
  try {
    await saveToSupabase();
  } catch (e) {
    toast('Cloud sync failed — saved on this device only');
  }
}

function openSettings() {
  const sb = getSupabaseCredentials();
  document.getElementById('settings-supabase-url').value = sb.url || '';
  document.getElementById('settings-supabase-key').value = sb.key || '';
  document.getElementById('settings-api-key').value = getConfig().apiKey;
  document.getElementById('settings-overlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}

function settingsOverlayClick(e) {
  if (e.target === document.getElementById('settings-overlay')) closeSettings();
}

async function saveSettings() {
  const sUrl = document.getElementById('settings-supabase-url').value.trim();
  const sKey = document.getElementById('settings-supabase-key').value.trim();
  if (sUrl) localStorage.setItem('gal_supabase_url', sUrl.replace(/\/$/, ''));
  else localStorage.removeItem('gal_supabase_url');
  if (sKey) localStorage.setItem('gal_supabase_key', sKey);
  else localStorage.removeItem('gal_supabase_key');

  const key = document.getElementById('settings-api-key').value.trim();
  if (key) localStorage.setItem('gal_api_key', key);
  else localStorage.removeItem('gal_api_key');

  closeSettings();
  toast('Saved');
  await persistJobs();
  await init();
}

function exportBackup() {
  const blob = new Blob([JSON.stringify(jobs, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `job-pipeline-backup-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Backup downloaded');
}

function importBackup(e) {
  const f = e.target.files && e.target.files[0];
  e.target.value = '';
  if (!f) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data)) throw new Error('invalid');
      jobs = data;
      await persistJobs();
      renderView();
      toast('Imported');
      closeSettings();
    } catch (err) {
      toast('Invalid JSON file');
    }
  };
  reader.readAsText(f);
}

async function clearAllData() {
  if (!confirm('Remove all applications from this browser and cloud (if connected)? This cannot be undone.')) return;
  jobs = [];
  await persistJobs();
  renderView();
  closeModal();
  closeSettings();
  toast('All roles cleared');
}

// --- Init ---
async function init() {
  const local = loadJobsFromStorage();
  if (!supabaseConfigured()) {
    jobs = local;
    renderView();
    renderStats();
    return;
  }
  try {
    const remote = await loadFromSupabase();
    if (remote.length === 0 && local.length > 0) {
      jobs = local;
      await persistJobs();
      toast('Uploaded local data to cloud');
    } else {
      jobs = remote;
      persistJobsLocal();
    }
  } catch (e) {
    jobs = local;
    toast('Cloud unavailable — using local data');
  }
  renderView();
  renderStats();
}

// --- Render ---
function filtered() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  const fs = document.getElementById('f-status').value;
  const fp = document.getElementById('f-priority').value;
  return jobs.filter(j => {
    if (fs && j.status !== fs) return false;
    if (fp && j.priority !== fp) return false;
    if (q && !(j.company+j.role+j.notes).toLowerCase().includes(q)) return false;
    return true;
  });
}

function setView(v) {
  view = v;
  document.getElementById('btn-table').classList.toggle('active', v === 'table');
  document.getElementById('btn-kanban').classList.toggle('active', v === 'kanban');
  document.getElementById('table-view').style.display = v === 'table' ? 'block' : 'none';
  document.getElementById('kanban-view').style.display = v === 'kanban' ? 'block' : 'none';
  renderView();
}

function renderView() {
  renderStats();
  if (view === 'table') renderTable();
  else renderKanban();
}

function renderStats() {
  const active = jobs.filter(j => !['Rejected','Pass'].includes(j.status));
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Total</div><div class="stat-num">${jobs.length}</div></div>
    <div class="stat"><div class="stat-label">Active</div><div class="stat-num accent">${active.length}</div></div>
    <div class="stat"><div class="stat-label">Interviews</div><div class="stat-num amber">${jobs.filter(j=>j.status==='Interview').length}</div></div>
    <div class="stat"><div class="stat-label">Offers</div><div class="stat-num green">${jobs.filter(j=>j.status==='Offer').length}</div></div>
  `;
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

function priDot(p) {
  const cls = {High:'dot-high',Medium:'dot-med',Low:'dot-low'}[p]||'dot-low';
  return `<span class="dot ${cls}"></span>`;
}

function badgeClass(s) {
  return {Watching:'s-watching',Applied:'s-applied',Interview:'s-interview',Offer:'s-offer',Rejected:'s-rejected',Pass:'s-pass'}[s]||'s-pass';
}

function renderTable() {
  const list = filtered();
  const tbody = document.getElementById('tbody');
  document.getElementById('table-empty').style.display = list.length ? 'none' : 'block';
  tbody.innerHTML = list.map(j => `
    <tr onclick="openModal('${j.id}')">
      <td class="company-cell">${j.company}</td>
      <td class="role-cell">${j.role}</td>
      <td><span class="badge ${badgeClass(j.status)}">${j.status}</span></td>
      <td style="font-size:12px;">${priDot(j.priority)} ${j.priority}</td>
      <td style="color:var(--muted);font-size:12px;">${fmtDate(j.date_applied)}</td>
      <td style="color:var(--muted);font-size:12px;">${j.source||'—'}</td>
      <td class="next-cell">${j.next_action||''}</td>
      <td><button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openModal('${j.id}')">Edit</button></td>
    </tr>
  `).join('');
}

function renderKanban() {
  const list = filtered();
  const kanban = document.getElementById('kanban');
  kanban.innerHTML = STATUSES.map(s => {
    const cards = list.filter(j => j.status === s);
    return `
      <div class="kanban-col">
        <div class="kanban-header">
          <span class="kanban-title">${s}</span>
          <span class="kanban-count">${cards.length}</span>
        </div>
        ${cards.length === 0 ? '<div style="font-size:12px;color:var(--muted);text-align:center;padding:1rem 0;">—</div>' : ''}
        ${cards.map(j => `
          <div class="kanban-card" onclick="openModal('${j.id}')">
            <div class="kc-company">${j.company}</div>
            <div class="kc-role">${j.role}</div>
            <div style="display:flex;align-items:center;gap:6px;">${priDot(j.priority)}<span class="kc-pri" style="color:var(--muted);font-size:11px;">${j.priority}</span></div>
            ${j.next_action ? `<div class="kc-next">→ ${j.next_action}</div>` : ''}
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}

// --- Modal ---
function openModal(id) {
  editingId = id || null;
  clearAI();
  if (id) {
    const j = jobs.find(x => x.id === id);
    if (!j) return;
    document.getElementById('modal-title').textContent = 'Edit role';
    document.getElementById('autofill-field').style.display = 'none';
    document.getElementById('f-company').value = j.company;
    document.getElementById('f-role').value = j.role;
    document.getElementById('f-status-m').value = j.status;
    document.getElementById('f-priority-m').value = j.priority;
    document.getElementById('f-date').value = j.date_applied || '';
    document.getElementById('f-source').value = j.source || 'LinkedIn';
    document.getElementById('f-url').value = j.url || '';
    document.getElementById('f-notes').value = j.notes || '';
    document.getElementById('del-btn').style.display = 'inline-flex';
    setTimeout(triggerAI, 300);
  } else {
    document.getElementById('modal-title').textContent = 'Add role';
    document.getElementById('autofill-field').style.display = 'block';
    document.getElementById('f-autofill-url').value = '';
    document.getElementById('autofill-status').textContent = '';
    document.getElementById('autofill-btn').textContent = 'Fill';
    document.getElementById('f-company').value = '';
    document.getElementById('f-role').value = '';
    document.getElementById('f-status-m').value = 'Watching';
    document.getElementById('f-priority-m').value = 'Medium';
    document.getElementById('f-date').value = '';
    document.getElementById('f-source').value = 'LinkedIn';
    document.getElementById('f-url').value = '';
    document.getElementById('f-notes').value = '';
    document.getElementById('del-btn').style.display = 'none';
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-company').focus(), 80);
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); editingId = null; }
function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

async function saveRole() {
  const company = document.getElementById('f-company').value.trim();
  const role = document.getElementById('f-role').value.trim();
  if (!company || !role) { toast('Company and role are required'); return; }

  const row = {
    company, role,
    status: document.getElementById('f-status-m').value,
    priority: document.getElementById('f-priority-m').value,
    date_applied: document.getElementById('f-date').value,
    source: document.getElementById('f-source').value,
    url: document.getElementById('f-url').value.trim(),
    notes: document.getElementById('f-notes').value.trim(),
    next_action: document.getElementById('ai-text').textContent || ''
  };

  try {
    if (editingId) {
      row.id = editingId;
      const idx = jobs.findIndex(j => j.id === editingId);
      if (idx > -1) jobs[idx] = { ...jobs[idx], ...row };
      toast('Updated');
    } else {
      row.id = Date.now().toString();
      row.created_at = new Date().toISOString();
      jobs.unshift(row);
      toast('Added');
    }
    await persistJobs();
    closeModal();
    renderView();
  } catch(e) { toast('Save failed'); }
}

async function deleteRole() {
  if (!editingId || !confirm('Remove this role?')) return;
  try {
    jobs = jobs.filter(j => j.id !== editingId);
    await persistJobs();
    closeModal();
    renderView();
    toast('Removed');
  } catch(e) { toast('Delete failed'); }
}

// --- URL Autofill ---
async function autofillFromUrl() {
  const { apiKey } = getConfig();
  if (!apiKey) { toast('Add an API key in Settings (⚙) for autofill'); return; }
  const url = document.getElementById('f-autofill-url').value.trim();
  if (!url || !url.startsWith('http')) { toast('Paste a valid job URL'); return; }

  const btn = document.getElementById('autofill-btn');
  const status = document.getElementById('autofill-status');
  btn.textContent = '...';
  btn.disabled = true;
  status.textContent = 'Reading the page...';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-beta': 'interleaved-thinking-2025-05-14' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{
          role: 'user',
          content: `Fetch this job posting URL and extract the details: ${url}

Return ONLY a JSON object (no markdown, no explanation) with these exact keys:
{
  "company": "Company name",
  "role": "Exact job title",
  "location": "Location or Remote",
  "notes": "2-3 sentence summary: key responsibilities, required skills, and what makes this role interesting"
}

If you cannot access the page, still return a best-guess JSON based on the URL itself.`
        }]
      })
    });

    const data = await res.json();
    const textBlock = data.content?.find(b => b.type === 'text');
    const raw = textBlock?.text || '';
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON');
    const parsed = JSON.parse(jsonMatch[0]);

    if (parsed.company) document.getElementById('f-company').value = parsed.company;
    if (parsed.role) document.getElementById('f-role').value = parsed.role;
    if (parsed.notes) document.getElementById('f-notes').value = parsed.notes + (parsed.location ? `\nLocation: ${parsed.location}` : '');
    document.getElementById('f-url').value = url;

    status.style.color = 'var(--green)';
    status.textContent = '✓ Filled from job page — review and adjust';
    btn.textContent = 'Fill';
    btn.disabled = false;
    triggerAI();
  } catch(e) {
    status.style.color = 'var(--red)';
    status.textContent = 'Could not read page — fill manually';
    btn.textContent = 'Fill';
    btn.disabled = false;
  }
}


function clearAI() {
  document.getElementById('ai-box').style.display = 'none';
  document.getElementById('ai-text').textContent = '';
  document.getElementById('ai-chips').innerHTML = '';
}

function triggerAI() {
  const { apiKey } = getConfig();
  if (!apiKey) return;
  clearTimeout(aiTimeout);
  aiTimeout = setTimeout(fetchAI, 600);
}

async function fetchAI() {
  const { apiKey } = getConfig();
  if (!apiKey) return;
  const company = document.getElementById('f-company').value.trim();
  const role = document.getElementById('f-role').value.trim();
  const status = document.getElementById('f-status-m').value;
  const notes = document.getElementById('f-notes').value.trim();
  if (!company || !role) return;

  const box = document.getElementById('ai-box');
  const spinner = document.getElementById('ai-spinner');
  const textEl = document.getElementById('ai-text');
  const chips = document.getElementById('ai-chips');
  box.style.display = 'block';
  spinner.style.display = 'inline-block';
  textEl.textContent = 'Thinking...';
  chips.innerHTML = '';

  const prompt = `You are a job search coach. The user is Gal Kalif, a Senior Technical PM at EL AL Airlines in Israel, looking for their next role.

Role: ${role} at ${company}
Status: ${status}
Notes: ${notes || 'None'}

Give ONE specific, actionable next step Gal should take for this application right now. Be direct and concrete — 1-2 sentences max. Then on a new line starting with "CHIPS:", give 2-3 short action labels (comma-separated) that represent quick follow-up actions.

Example format:
Send a connection request to the hiring manager on LinkedIn and mention your GenAI work at EL AL as a conversation opener.
CHIPS: Connect on LinkedIn, Research team, Draft cover letter`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 200, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    const parts = text.split('\nCHIPS:');
    const main = parts[0].trim();
    const chipList = parts[1] ? parts[1].split(',').map(c => c.trim()).filter(Boolean) : [];
    spinner.style.display = 'none';
    textEl.textContent = main;
    chips.innerHTML = chipList.map(c => `<span class="ai-chip" onclick="applyChip('${c}')">${c}</span>`).join('');
  } catch(e) {
    spinner.style.display = 'none';
    textEl.textContent = 'AI unavailable — check API key';
  }
}

function applyChip(label) {
  const notes = document.getElementById('f-notes');
  const val = notes.value.trim();
  notes.value = val ? val + '\n→ ' + label : '→ ' + label;
}

// --- Toast ---
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

init().catch(() => toast('Could not start'));
</script>
